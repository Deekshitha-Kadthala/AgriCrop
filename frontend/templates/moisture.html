<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soil Moisture Prediction</title>

    <link rel="stylesheet" href="/static/css/moisture.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>🌱 Soil Moisture Prediction</h1>

        <form action="/moisture" method="POST">

            <div class="input-group">
                <label>Temperature (°C)</label>
                <input
                    type="number"
                    step="0.1"
                    name="temperature"
                    placeholder="Enter Temperature"
                    required>
            </div>

            <div class="input-group">
                <label>Humidity (%)</label>
                <input
                    type="number"
                    step="0.1"
                    name="humidity"
                    placeholder="Enter Humidity"
                    required>
            </div>

            <button type="submit">
                Predict Moisture
            </button>

        </form>

    </div>

    {% if moisture %}

    <div class="result-card">

        <h2>Prediction Result</h2>

        <div class="result">

            <h3>{{ moisture }}%</h3>

            <p>Estimated Soil Moisture</p>

        </div>

    </div>

    {% endif %}

</div>

</body>
</html>
